name: Dosa 빌드 자동 트리거

on:
  push:
    branches: [main]
    paths:
      - 'scenes/**'

jobs:
  trigger-dosa-build:
    name: dosa 빌드 트리거
    runs-on: ubuntu-22.04
    steps:
      - name: Arrru/dosa 빌드 트리거
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOSA_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Arrru/dosa/dispatches \
            -d '{"event_type":"scenes-updated"}' \
            -w "\nHTTP %{http_code}"
